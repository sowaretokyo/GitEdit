name: Release

# タグを push すると Universal .dmg をビルド・署名・Notarize して
# GitHub Releases に添付する。
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン（例 0.1.0）'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=${v}" >> "${GITHUB_OUTPUT}"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"
          KEYCHAIN="${RUNNER_TEMP}/app-signing.keychain-db"
          echo -n "${BUILD_CERTIFICATE_BASE64}" | base64 --decode -o "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security import "${CERT_PATH}" -P "${P12_PASSWORD}" \
              -A -t cert -f pkcs12 -k "${KEYCHAIN}"
          security set-key-partition-list -S apple-tool:,apple: \
              -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security list-keychain -d user -s "${KEYCHAIN}" $(security list-keychains -d user | tr -d '"')

      - name: Build .app
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          APP_BUILD: ${{ github.run_number }}
        run: bash scripts/build-app.sh

      - name: Sign + Notarize + DMG
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/sign-and-notarize.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitEdit-${{ steps.ver.outputs.version }}-dmg
          path: build/GitEdit-${{ steps.ver.outputs.version }}.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: GitEdit ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: build/GitEdit-${{ steps.ver.outputs.version }}.dmg
